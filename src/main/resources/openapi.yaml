openapi: 3.1.0

info:
  title: Monopoly Session Server API
  version: 1.0.0
  description: |
    HTTP API for the standalone Monopoly session server (`StartSessionServer`).

    ## Session lifecycle

    ### Immediate start (existing behaviour)
    1. `POST /sessions` with `names`, `colors`, `seatKinds`, `difficulties`.
    2. Open `GET /sessions/{id}/events` for SSE updates.
    3. Submit actions via `POST /sessions/{id}/command`.

    ### Lobby / waiting-room mode (new)
    1. `POST /sessions` with `lobbyMode: true`, `seatCount`, `colors` — creates a `LOBBY` session.
    2. Each human player calls `POST /sessions/{id}/join` with their name and colour.
       The response contains their `playerId` — store it (e.g. in `localStorage`).
    3. Open `GET /sessions/{id}/events` to watch other players join in real time.
    4. Any player calls `POST /sessions/{id}/start` once everyone is ready (min 2 joined).
       Empty seats are filled with bots automatically.
    5. Game transitions to `IN_PROGRESS` and proceeds normally.

    ## Commands

    All commands share a `type` discriminator field. Most also require
    `actorPlayerId`. When submitting via `POST /sessions/{id}/command` the
    `sessionId` body field is optional — the server fills it from the URL path.
    The server returns HTTP 200 with `accepted: true` on success, or HTTP 422
    with rejection details on failure.

    ## CORS

    All responses include `Access-Control-Allow-Origin: *`.
    `OPTIONS` preflight requests return HTTP 204.

    ## Backward-compatible single-session endpoints

    When the server is started with player names as CLI arguments it also exposes
    `/command`, `/snapshot`, and `/events` without a session-ID path segment.
    These are omitted here; they use identical schemas.

servers:
  - url: http://localhost:8080
    description: Local dev server (default port)

tags:
  - name: meta
    description: Server health and session registry
  - name: session
    description: Per-session game operations

# ──────────────────────────────────────────────────────────────────────────────
paths:

  /health:
    get:
      tags: [meta]
      summary: Liveness probe
      operationId: getHealth
      responses:
        '200':
          description: Server is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  sessions:
                    type: integer
                    description: Number of currently active sessions (-1 in single-session mode)
                  uptimeSeconds:
                    type: integer
                    format: int64
                    description: Seconds since server start
                  version:
                    type: string
                    example: 1.0-SNAPSHOT

  /metrics:
    get:
      tags: [meta]
      summary: Prometheus-compatible metrics
      operationId: getMetrics
      responses:
        '200':
          description: Metrics in Prometheus text exposition format
          content:
            text/plain:
              schema:
                type: string
                description: |
                  Counters and gauges in the standard Prometheus text format.
                  Exposed metrics: `monopoly_commands_total`,
                  `monopoly_commands_accepted_total`,
                  `monopoly_commands_rejected_total`,
                  `monopoly_sessions_created_total`,
                  `monopoly_sessions_active`,
                  `monopoly_uptime_seconds`.

  /sessions:
    get:
      tags: [meta]
      summary: List all active sessions
      operationId: listSessions
      responses:
        '200':
          description: Array of session summaries (may be empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionSummary'

    post:
      tags: [meta]
      summary: Create a new game session
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
            example:
              names: [Jukka, Botti]
              colors: ['#E63946', '#2A9D8F']
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSessionResponse'
        '400':
          description: Missing or empty `names` field
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sessions/{sessionId}:
    delete:
      tags: [meta]
      summary: Delete (terminate) a session
      operationId: deleteSession
      description: |
        Stops all bot drivers for the session and removes it from the registry.
        Idempotent within the TTL window — a second call on the same ID returns 404.
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '204':
          description: Session deleted successfully (no body)
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sessions/{sessionId}/join:
    post:
      tags: [session]
      summary: Join a lobby session
      operationId: joinLobby
      description: |
        Claims the first available (unjoined) seat in a `LOBBY` session.
        Returns the `playerId` assigned to this browser client — store it in
        `localStorage` keyed by `sessionId` to identify yourself in subsequent commands.
        Triggers an SSE event so other connected clients see the updated lobby state.
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinLobbyRequest'
            example:
              name: Jukka
              color: '#E63946'
      responses:
        '200':
          description: Seat claimed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinLobbyResponse'
        '400':
          description: Missing or empty `name`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: No available seats or session is not in `LOBBY` state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sessions/{sessionId}/start:
    post:
      tags: [session]
      summary: Start a lobby game
      operationId: startLobby
      description: |
        Transitions a `LOBBY` session to `IN_PROGRESS`.
        Any unjoined seats are filled with bot players automatically.
        Requires at least 2 joined players.
        Triggers an SSE event to all connected clients with the new game state.
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Game started
          content:
            application/json:
              schema:
                type: object
                properties:
                  started:
                    type: boolean
                    example: true
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Session not in `LOBBY` state or fewer than 2 players joined
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sessions/{sessionId}/lobby/bots:
    post:
      tags: [session]
      summary: Add a bot to a lobby session
      operationId: addLobbyBot
      description: |
        Appends a new BOT seat to a `LOBBY` session (host-only action, max 6 seats total).
        The bot is assigned a name ("Botti N") and a colour automatically.
        Triggers an SSE event to all connected clients.
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hostToken]
              properties:
                hostToken:
                  type: string
                  format: uuid
                  description: Host token received from `POST /sessions`
      responses:
        '200':
          description: Bot added
          content:
            application/json:
              schema:
                type: object
                properties:
                  seatId:
                    type: string
                  name:
                    type: string
        '403':
          description: Invalid host token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Session not in `LOBBY` state or seat limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sessions/{sessionId}/lobby/bots/{seatId}:
    delete:
      tags: [session]
      summary: Remove a bot from a lobby session
      operationId: removeLobbyBot
      description: |
        Removes an existing BOT seat from a `LOBBY` session (host-only action).
        Triggers an SSE event to all connected clients.
      parameters:
        - $ref: '#/components/parameters/sessionId'
        - name: seatId
          in: path
          required: true
          schema:
            type: string
          description: ID of the bot seat to remove
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hostToken]
              properties:
                hostToken:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Bot removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  removed:
                    type: boolean
        '403':
          description: Invalid host token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session or seat not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sessions/{sessionId}/lobby/ready:
    post:
      tags: [session]
      summary: Set a player's ready status in the lobby
      operationId: setLobbyReady
      description: |
        Marks a player as ready (or not ready) in a `LOBBY` session.
        When all joined human players are ready the host may call `POST /sessions/{id}/start`.
        Triggers an SSE event to all connected clients.
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [playerId, playerToken]
              properties:
                playerId:
                  type: string
                playerToken:
                  type: string
                  format: uuid
                ready:
                  type: boolean
                  default: true
      responses:
        '200':
          description: Ready status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  changed:
                    type: boolean
        '403':
          description: Invalid player token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sessions/{sessionId}/settings:
    get:
      tags: [session]
      summary: Get current session settings
      operationId: getSettings
      description: |
        Returns the current runtime settings for the session.
        Useful for validating that a prior `PUT /sessions/{id}/settings` was applied.
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Current settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionSettingsResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [session]
      summary: Update session settings
      operationId: applySettings
      description: |
        Applies one or more runtime settings to the session.
        Only the keys present in the request body are updated; unknown keys are ignored.
        Changes take effect immediately — the next bot action will use the new values.
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionSettingsRequest'
            example:
              botSpeed: fast
      responses:
        '200':
          description: Settings applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sessions/{sessionId}/command:
    post:
      tags: [session]
      summary: Submit a game command
      operationId: submitCommand
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCommand'
      responses:
        '200':
          description: Command accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResult'
              example:
                accepted: true
                rejections: []
        '400':
          description: Unknown command type or malformed JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Command rejected by game rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResult'
              example:
                accepted: false
                rejections:
                  - code: NOT_YOUR_TURN
                    message: It is not player-2's turn

  /sessions/{sessionId}/snapshot:
    get:
      tags: [session]
      summary: Get the current session snapshot (poll)
      operationId: getSnapshot
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Current game state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientSessionSnapshot'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sessions/{sessionId}/events:
    get:
      tags: [session]
      summary: Server-Sent Events stream of snapshot updates
      operationId: streamEvents
      description: |
        Opens a persistent SSE connection. The server immediately pushes the
        current snapshot as the first event (unless `Last-Event-ID` matches the
        current `version`), then pushes a new snapshot after every accepted
        command. A `": heartbeat"` comment is sent every 30 s to keep proxies
        from closing idle connections.

        Each event is a single `data:` line containing a full
        `ClientSessionSnapshot` JSON object followed by two newlines.

        ```
        data: {"sessionId":"...","version":5,"status":"IN_PROGRESS",...}

        ```

        On reconnect, pass the last received `version` value as the
        `Last-Event-ID` request header to avoid replaying an already-known
        snapshot.
      parameters:
        - $ref: '#/components/parameters/sessionId'
        - name: Last-Event-ID
          in: header
          required: false
          schema:
            type: integer
            format: int64
          description: |
            Version of the last snapshot the client successfully received.
            If the server's current snapshot version equals this value the
            initial push is skipped, avoiding a redundant replay on reconnect.
      responses:
        '200':
          description: SSE stream (never terminates until client disconnects)
          content:
            text/event-stream:
              schema:
                type: string
                description: Newline-delimited SSE events carrying ClientSessionSnapshot JSON
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

# ──────────────────────────────────────────────────────────────────────────────
components:

  parameters:
    sessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Session ID returned by `POST /sessions`

  schemas:

    # ── Settings ─────────────────────────────────────────────────────────────

    SessionSettingsRequest:
      type: object
      description: |
        Runtime settings for the session. All fields are optional — only present keys are applied.
      properties:
        botSpeed:
          type: string
          enum: [fast, normal, slow]
          description: |
            Controls how quickly bots act.
            - `fast` — instant (0 ms delay)
            - `normal` — human-like delays (~1–3 s per action)
            - `slow` — exaggerated delays (~2.5–7 s per action)

    SessionSettingsResponse:
      type: object
      properties:
        botSpeed:
          type: string
          enum: [fast, normal, slow, n/a (no bots)]
          description: Resolved speed label for the current multiplier
        botSpeedMultiplier:
          type: string
          description: Raw multiplier value (e.g. "0.0", "1.0", "2.5") or "n/a" if the session has no bots

    # ── Meta ────────────────────────────────────────────────────────────────

    CreateSessionRequest:
      type: object
      description: |
        Two modes of operation:
        - **Immediate start** (default): provide `names` (required), `colors`, `seatKinds`, `difficulties`.
        - **Lobby mode**: set `lobbyMode: true`, provide `seatCount` and `colors`. Players join later via `POST /sessions/{id}/join`.
      properties:
        names:
          type: array
          minItems: 2
          maxItems: 6
          items:
            type: string
          description: |
            Player display names in seat order (required for immediate-start mode;
            omit or set `lobbyMode: true` for lobby mode).
          example: [Jukka, Botti]
        colors:
          type: array
          items:
            type: string
          description: |
            CSS hex colours for each seat (e.g. `#E63946`).
            Falls back to grey for unspecified seats.
          example: ['#E63946', '#2A9D8F', '#E9C46A', '#264653']
        seatKinds:
          type: array
          items:
            type: string
            enum: [HUMAN, BOT]
          description: |
            Seat kinds per player (immediate-start only). Missing entries default to `HUMAN`.
          example: [HUMAN, BOT]
        difficulties:
          type: array
          items:
            type: string
            enum: [EASY, NORMAL, STRONG]
          description: |
            Bot difficulty per seat. Missing entries default to `NORMAL`.
          example: [NORMAL, STRONG]
        lobbyMode:
          type: boolean
          default: false
          description: |
            When `true`, creates a lobby session in `LOBBY` state.
            `names`, `seatKinds`, and `difficulties` are ignored; use `seatCount` instead.
        seatCount:
          type: integer
          minimum: 2
          maximum: 6
          default: 4
          description: Number of seat slots to create (lobby mode only).

    CreateSessionResponse:
      type: object
      required: [sessionId, hostToken]
      properties:
        sessionId:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        hostToken:
          type: string
          format: uuid
          description: Secret token granting host/admin privileges (e.g. AbortGame). Store in localStorage.

    SessionSummary:
      type: object
      required: [sessionId, playerNames, status]
      properties:
        sessionId:
          type: string
          format: uuid
        playerNames:
          type: array
          items:
            type: string
        status:
          $ref: '#/components/schemas/SessionStatus'

    # ── Command result ───────────────────────────────────────────────────────

    CommandResult:
      type: object
      required: [accepted, rejections]
      properties:
        accepted:
          type: boolean
        rejections:
          type: array
          items:
            $ref: '#/components/schemas/CommandRejection'

    CommandRejection:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable rejection code (e.g. `NOT_YOUR_TURN`)
          example: NOT_YOUR_TURN
        message:
          type: string
          description: Human-readable explanation
          example: It is not player-2's turn

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

    # ── Snapshot ─────────────────────────────────────────────────────────────

    ClientSessionSnapshot:
      type: object
      required: [sessionId, version, status, viewAvailable]
      properties:
        sessionId:
          type: string
          format: uuid
        version:
          type: integer
          format: int64
          description: Monotonically increasing state version
        status:
          $ref: '#/components/schemas/SessionStatus'
        viewAvailable:
          type: boolean
          description: True when the session host has a live game view attached
        state:
          $ref: '#/components/schemas/SessionState'

    SessionState:
      type: object
      required: [sessionId, version, status, seats, players, properties, turn]
      properties:
        sessionId:
          type: string
          format: uuid
        version:
          type: integer
          format: int64
        status:
          $ref: '#/components/schemas/SessionStatus'
        seats:
          type: array
          items:
            $ref: '#/components/schemas/SeatState'
        players:
          type: array
          items:
            $ref: '#/components/schemas/PlayerSnapshot'
        properties:
          type: array
          items:
            $ref: '#/components/schemas/PropertyStateSnapshot'
        turn:
          $ref: '#/components/schemas/TurnState'
        pendingDecision:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/PendingDecision'
        auctionState:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/AuctionState'
        activeDebt:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DebtStateModel'
        tradeState:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/TradeState'
        winnerPlayerId:
          type: string
          nullable: true

    SeatState:
      type: object
      required: [seatId, seatIndex, playerId, seatKind, controlMode, joined]
      properties:
        seatId:
          type: string
          example: seat-0
        seatIndex:
          type: integer
          minimum: 0
        playerId:
          type: string
          example: player-1
        seatKind:
          type: string
          enum: [HUMAN, BOT]
        controlMode:
          type: string
          enum: [MANUAL, AUTOMATIC]
        displayName:
          type: string
          nullable: true
          description: Player name. `null` for unclaimed lobby seats.
          example: Jukka
        controllerProfileId:
          type: string
          nullable: true
        tokenColorHex:
          type: string
          description: CSS hex colour for this seat's token
          example: '#E63946'
        joined:
          type: boolean
          description: |
            `true` when the seat is claimed by a human or assigned to a bot.
            `false` only in `LOBBY` sessions for available seats.
          example: true

    JoinLobbyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Display name for the player
          example: Jukka
        color:
          type: string
          description: |
            Preferred CSS hex colour. If omitted or blank, the seat's pre-assigned colour is used.
          example: '#E63946'

    JoinLobbyResponse:
      type: object
      required: [playerId, seatId, tokenColorHex, playerToken]
      properties:
        playerId:
          type: string
          description: The player ID assigned to this client. Store in sessionStorage keyed by sessionId.
          example: player-1
        seatId:
          type: string
          example: seat-0
        tokenColorHex:
          type: string
          example: '#E63946'
        playerToken:
          type: string
          format: uuid
          description: Secret token authenticating this player for all game commands. Store in sessionStorage.

    PlayerSnapshot:
      type: object
      required: [playerId, seatId, name, cash, boardIndex, bankrupt, eliminated,
                 inJail, jailRoundsRemaining, getOutOfJailCards, ownedPropertyIds]
      properties:
        playerId:
          type: string
          example: player-1
        seatId:
          type: string
          example: seat-0
        name:
          type: string
          example: Jukka
        cash:
          type: integer
          description: Current cash in euros
          example: 1500
        boardIndex:
          type: integer
          minimum: 0
          maximum: 39
          description: Current board position (0 = GO)
        bankrupt:
          type: boolean
        eliminated:
          type: boolean
        inJail:
          type: boolean
        jailRoundsRemaining:
          type: integer
        getOutOfJailCards:
          type: integer
        ownedPropertyIds:
          type: array
          items:
            type: string
          description: IDs of all properties owned by this player (e.g. `B1`, `RR2`)

    PropertyStateSnapshot:
      type: object
      required: [propertyId, mortgaged, houseCount, hotelCount]
      properties:
        propertyId:
          type: string
          description: SpotType enum name (e.g. `B1`, `RR1`, `U1`, `GO_SPOT`)
          example: B1
        ownerPlayerId:
          type: string
          nullable: true
          example: player-1
        mortgaged:
          type: boolean
        houseCount:
          type: integer
          minimum: 0
          maximum: 4
        hotelCount:
          type: integer
          minimum: 0
          maximum: 1

    TurnState:
      type: object
      required: [activePlayerId, phase, canRoll, canEndTurn, consecutiveDoubles]
      properties:
        activePlayerId:
          type: string
          nullable: true
          example: player-1
        phase:
          $ref: '#/components/schemas/TurnPhase'
        canRoll:
          type: boolean
        canEndTurn:
          type: boolean
        consecutiveDoubles:
          type: integer
          minimum: 0
          maximum: 3
        lastDice:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 6
          minItems: 2
          maxItems: 2
          nullable: true

    PendingDecision:
      type: object
      required: [decisionId, decisionType, actorPlayerId, allowedActions]
      properties:
        decisionId:
          type: string
          format: uuid
        decisionType:
          type: string
          example: PROPERTY_PURCHASE
        actorPlayerId:
          type: string
        allowedActions:
          type: array
          items:
            type: string
        summaryText:
          type: string
          nullable: true
        payload:
          type: object
          nullable: true
          description: |
            Decision-specific payload. For `PROPERTY_PURCHASE` decisions contains
            at minimum a `propertyId` field needed for `BuyProperty` /
            `DeclineProperty` commands.

    AuctionState:
      type: object
      required: [auctionId, propertyId, triggeringPlayerId, currentActorPlayerId,
                 currentBid, minimumNextBid, passedPlayerIds, eligiblePlayerIds, status]
      properties:
        auctionId:
          type: string
          format: uuid
        propertyId:
          type: string
          example: B1
        triggeringPlayerId:
          type: string
        currentActorPlayerId:
          type: string
          nullable: true
        leadingPlayerId:
          type: string
          nullable: true
        currentBid:
          type: integer
        minimumNextBid:
          type: integer
        passedPlayerIds:
          type: array
          items:
            type: string
          uniqueItems: true
        eligiblePlayerIds:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [ACTIVE, WON_PENDING_RESOLUTION]
        winningBid:
          type: integer
        winningPlayerId:
          type: string
          nullable: true

    DebtStateModel:
      type: object
      required: [debtId, debtorPlayerId, creditorType, amountRemaining,
                 bankruptcyRisk, currentCash, estimatedLiquidationValue, allowedActions]
      properties:
        debtId:
          type: string
          format: uuid
        debtorPlayerId:
          type: string
          example: player-2
        creditorType:
          type: string
          enum: [BANK, PLAYER]
        creditorPlayerId:
          type: string
          nullable: true
          description: Set when `creditorType` is `PLAYER`
        amountRemaining:
          type: integer
          description: Remaining debt amount in euros
        reason:
          type: string
          nullable: true
          description: Human-readable reason for the debt (e.g. rent or tax)
        bankruptcyRisk:
          type: boolean
          description: True when the debtor cannot pay even after full liquidation
        currentCash:
          type: integer
        estimatedLiquidationValue:
          type: integer
          description: Sum of all mortgageable property values + sellable buildings
        allowedActions:
          type: array
          items:
            type: string
          description: Which debt actions are currently permitted

    TradeState:
      type: object
      required: [tradeId, initiatorPlayerId, recipientPlayerId, status]
      properties:
        tradeId:
          type: string
          format: uuid
        initiatorPlayerId:
          type: string
        recipientPlayerId:
          type: string
        status:
          type: string
          enum: [EDITING, SUBMITTED, COUNTERED, ACCEPTED_PENDING_APPLY, DECLINED, CANCELLED]
        currentOffer:
          type: object
          nullable: true
          description: Current trade offer (cash + property lists per side)
        editingPlayerId:
          type: string
          nullable: true
        editingOfferedSide:
          type: boolean
        decisionRequiredFromPlayerId:
          type: string
          nullable: true
        openedByPlayerId:
          type: string
          nullable: true
        history:
          type: array
          items:
            type: object

    # ── Enums ────────────────────────────────────────────────────────────────

    SessionStatus:
      type: string
      enum: [LOBBY, IN_PROGRESS, PAUSED, GAME_OVER]
      description: |
        - `LOBBY` — waiting for players to join before the game starts
        - `IN_PROGRESS` — game is actively being played
        - `PAUSED` — game is paused (reserved, not currently used by the HTTP server)
        - `GAME_OVER` — game has ended

    TurnPhase:
      type: string
      enum:
        - WAITING_FOR_ROLL
        - WAITING_FOR_DECISION
        - WAITING_FOR_AUCTION
        - RESOLVING_DEBT
        - WAITING_FOR_END_TURN
        - GAME_OVER
        - UNKNOWN

    # ── Commands (discriminated union on "type") ─────────────────────────────

    SessionCommand:
      discriminator:
        propertyName: type
        mapping:
          RollDice:                         '#/components/schemas/RollDiceCommand'
          EndTurn:                          '#/components/schemas/EndTurnCommand'
          BuyProperty:                      '#/components/schemas/BuyPropertyCommand'
          DeclineProperty:                  '#/components/schemas/DeclinePropertyCommand'
          PayDebt:                          '#/components/schemas/PayDebtCommand'
          MortgagePropertyForDebt:          '#/components/schemas/MortgagePropertyForDebtCommand'
          SellBuildingForDebt:              '#/components/schemas/SellBuildingForDebtCommand'
          SellBuildingRoundsAcrossSetForDebt: '#/components/schemas/SellBuildingRoundsAcrossSetForDebtCommand'
          DeclareBankruptcy:                '#/components/schemas/DeclareBankruptcyCommand'
          PassAuction:                      '#/components/schemas/PassAuctionCommand'
          PlaceAuctionBid:                  '#/components/schemas/PlaceAuctionBidCommand'
          FinishAuctionResolution:          '#/components/schemas/FinishAuctionResolutionCommand'
          OpenTrade:                        '#/components/schemas/OpenTradeCommand'
          SubmitTradeOffer:                 '#/components/schemas/SubmitTradeOfferCommand'
          AcceptTrade:                      '#/components/schemas/AcceptTradeCommand'
          CounterTrade:                     '#/components/schemas/CounterTradeCommand'
          DeclineTrade:                     '#/components/schemas/DeclineTradeCommand'
          CancelTrade:                      '#/components/schemas/CancelTradeCommand'
          EditTradeOffer:                   '#/components/schemas/EditTradeOfferCommand'
          BuyBuildingRound:                 '#/components/schemas/BuyBuildingRoundCommand'
          ToggleMortgage:                   '#/components/schemas/ToggleMortgageCommand'
          RefreshSessionView:               '#/components/schemas/RefreshSessionViewCommand'
          UseGetOutOfJailCard:              '#/components/schemas/UseGetOutOfJailCardCommand'
          PayJailFine:                      '#/components/schemas/PayJailFineCommand'
          SellBuildingRound:                '#/components/schemas/SellBuildingRoundCommand'
          AbortGame:                        '#/components/schemas/AbortGameCommand'
      oneOf:
        - $ref: '#/components/schemas/RollDiceCommand'
        - $ref: '#/components/schemas/EndTurnCommand'
        - $ref: '#/components/schemas/BuyPropertyCommand'
        - $ref: '#/components/schemas/DeclinePropertyCommand'
        - $ref: '#/components/schemas/PayDebtCommand'
        - $ref: '#/components/schemas/MortgagePropertyForDebtCommand'
        - $ref: '#/components/schemas/SellBuildingForDebtCommand'
        - $ref: '#/components/schemas/SellBuildingRoundsAcrossSetForDebtCommand'
        - $ref: '#/components/schemas/DeclareBankruptcyCommand'
        - $ref: '#/components/schemas/PassAuctionCommand'
        - $ref: '#/components/schemas/PlaceAuctionBidCommand'
        - $ref: '#/components/schemas/FinishAuctionResolutionCommand'
        - $ref: '#/components/schemas/OpenTradeCommand'
        - $ref: '#/components/schemas/SubmitTradeOfferCommand'
        - $ref: '#/components/schemas/AcceptTradeCommand'
        - $ref: '#/components/schemas/CounterTradeCommand'
        - $ref: '#/components/schemas/DeclineTradeCommand'
        - $ref: '#/components/schemas/CancelTradeCommand'
        - $ref: '#/components/schemas/EditTradeOfferCommand'
        - $ref: '#/components/schemas/BuyBuildingRoundCommand'
        - $ref: '#/components/schemas/ToggleMortgageCommand'
        - $ref: '#/components/schemas/RefreshSessionViewCommand'
        - $ref: '#/components/schemas/UseGetOutOfJailCardCommand'
        - $ref: '#/components/schemas/PayJailFineCommand'
        - $ref: '#/components/schemas/SellBuildingRoundCommand'
        - $ref: '#/components/schemas/AbortGameCommand'

    # Base shared by most commands
    BaseCommand:
      type: object
      required: [type]
      properties:
        type:
          type: string
          description: Command type discriminator
        sessionId:
          type: string
          format: uuid
          description: |
            Session identifier. Optional when submitting via
            `POST /sessions/{id}/command` — the server uses the path parameter.
            Required when using the single-session `POST /command` endpoint.
        commandId:
          type: string
          format: uuid
          description: |
            Optional client-generated idempotency key. If provided and the
            server has already processed a command with this ID for this
            session, the original result is returned without re-executing
            the command. Useful to safely retry after a network error.

    BaseActorCommand:
      allOf:
        - $ref: '#/components/schemas/BaseCommand'
        - type: object
          required: [actorPlayerId]
          properties:
            actorPlayerId:
              type: string
              example: player-1

    # ── Turn commands ──────────────────────────────────────────────────────

    RollDiceCommand:
      title: RollDice
      description: Roll the dice to start the active player's turn. Only valid during `WAITING_FOR_ROLL`.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          properties:
            type:
              type: string
              enum: [RollDice]
      example:
        type: RollDice
        sessionId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        actorPlayerId: player-1

    EndTurnCommand:
      title: EndTurn
      description: End the active player's turn. Only valid during `WAITING_FOR_END_TURN`.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          properties:
            type:
              type: string
              enum: [EndTurn]
      example:
        type: EndTurn
        sessionId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        actorPlayerId: player-1

    # ── Property purchase ──────────────────────────────────────────────────

    BuyPropertyCommand:
      title: BuyProperty
      description: |
        Purchase the property the active player has landed on.
        Requires `decisionId` from `state.pendingDecision.decisionId` and
        `propertyId` from the decision payload.
        Only valid during `WAITING_FOR_DECISION`.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          required: [decisionId, propertyId]
          properties:
            type:
              type: string
              enum: [BuyProperty]
            decisionId:
              type: string
              format: uuid
              description: From `state.pendingDecision.decisionId`
            propertyId:
              type: string
              example: B1
      example:
        type: BuyProperty
        sessionId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        actorPlayerId: player-1
        decisionId: a1b2c3d4-0000-0000-0000-000000000000
        propertyId: B1

    DeclinePropertyCommand:
      title: DeclineProperty
      description: |
        Decline to purchase the property and send it to auction.
        Requires the same `decisionId` and `propertyId` as `BuyProperty`.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          required: [decisionId, propertyId]
          properties:
            type:
              type: string
              enum: [DeclineProperty]
            decisionId:
              type: string
              format: uuid
            propertyId:
              type: string
      example:
        type: DeclineProperty
        sessionId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        actorPlayerId: player-1
        decisionId: a1b2c3d4-0000-0000-0000-000000000000
        propertyId: B1

    # ── Debt resolution ────────────────────────────────────────────────────

    PayDebtCommand:
      title: PayDebt
      description: |
        Pay the outstanding debt in full from the player's cash.
        Only valid during `RESOLVING_DEBT` when the player has sufficient cash.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          required: [debtId]
          properties:
            type:
              type: string
              enum: [PayDebt]
            debtId:
              type: string
              format: uuid
              description: From `state.activeDebt.debtId`
      example:
        type: PayDebt
        sessionId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        actorPlayerId: player-2
        debtId: d0000000-0000-0000-0000-000000000001

    MortgagePropertyForDebtCommand:
      title: MortgagePropertyForDebt
      description: Mortgage one of the debtor's properties to raise cash during debt resolution.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          required: [debtId, propertyId]
          properties:
            type:
              type: string
              enum: [MortgagePropertyForDebt]
            debtId:
              type: string
              format: uuid
            propertyId:
              type: string
              example: B1
      example:
        type: MortgagePropertyForDebt
        sessionId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        actorPlayerId: player-2
        debtId: d0000000-0000-0000-0000-000000000001
        propertyId: B1

    SellBuildingForDebtCommand:
      title: SellBuildingForDebt
      description: Sell one or more buildings on a property to raise cash during debt resolution.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          required: [debtId, propertyId, count]
          properties:
            type:
              type: string
              enum: [SellBuildingForDebt]
            debtId:
              type: string
              format: uuid
            propertyId:
              type: string
            count:
              type: integer
              minimum: 1
              description: Number of buildings to sell (1 sells one house or hotel)
      example:
        type: SellBuildingForDebt
        sessionId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        actorPlayerId: player-2
        debtId: d0000000-0000-0000-0000-000000000001
        propertyId: O1
        count: 1

    SellBuildingRoundsAcrossSetForDebtCommand:
      title: SellBuildingRoundsAcrossSetForDebt
      description: |
        Sell buildings evenly across an entire colour group (one round = one building
        from every property in the group). Useful for rapidly liquidating a developed set.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          required: [debtId, propertyId, rounds]
          properties:
            type:
              type: string
              enum: [SellBuildingRoundsAcrossSetForDebt]
            debtId:
              type: string
              format: uuid
            propertyId:
              type: string
              description: Any property in the colour group
            rounds:
              type: integer
              minimum: 1

    DeclareBankruptcyCommand:
      title: DeclareBankruptcy
      description: Declare bankruptcy, eliminating the player from the game.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          required: [debtId]
          properties:
            type:
              type: string
              enum: [DeclareBankruptcy]
            debtId:
              type: string
              format: uuid
      example:
        type: DeclareBankruptcy
        sessionId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        actorPlayerId: player-2
        debtId: d0000000-0000-0000-0000-000000000001

    # ── Auction ────────────────────────────────────────────────────────────

    PassAuctionCommand:
      title: PassAuction
      description: Pass (skip bidding) for the current auction round.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          required: [auctionId]
          properties:
            type:
              type: string
              enum: [PassAuction]
            auctionId:
              type: string
              format: uuid
              description: From `state.auctionState.auctionId`
      example:
        type: PassAuction
        sessionId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        actorPlayerId: player-1
        auctionId: e0000000-0000-0000-0000-000000000002

    PlaceAuctionBidCommand:
      title: PlaceAuctionBid
      description: |
        Place a bid in the current auction.
        `amount` must be ≥ `state.auctionState.minimumNextBid`.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          required: [auctionId, amount]
          properties:
            type:
              type: string
              enum: [PlaceAuctionBid]
            auctionId:
              type: string
              format: uuid
            amount:
              type: integer
              minimum: 1
      example:
        type: PlaceAuctionBid
        sessionId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        actorPlayerId: player-1
        auctionId: e0000000-0000-0000-0000-000000000002
        amount: 120

    FinishAuctionResolutionCommand:
      title: FinishAuctionResolution
      description: Finalise a resolved auction and transfer the property to the winner.
      allOf:
        - $ref: '#/components/schemas/BaseCommand'
        - type: object
          required: [auctionId]
          properties:
            type:
              type: string
              enum: [FinishAuctionResolution]
            auctionId:
              type: string
              format: uuid

    # ── Trade ──────────────────────────────────────────────────────────────

    OpenTradeCommand:
      title: OpenTrade
      description: Initiate a trade negotiation with another player.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          required: [recipientPlayerId]
          properties:
            type:
              type: string
              enum: [OpenTrade]
            recipientPlayerId:
              type: string

    SubmitTradeOfferCommand:
      title: SubmitTradeOffer
      description: Submit the current draft offer to the other player for review.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          required: [tradeId]
          properties:
            type:
              type: string
              enum: [SubmitTradeOffer]
            tradeId:
              type: string
              format: uuid

    AcceptTradeCommand:
      title: AcceptTrade
      description: Accept the submitted trade offer and execute the exchange.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          required: [tradeId]
          properties:
            type:
              type: string
              enum: [AcceptTrade]
            tradeId:
              type: string
              format: uuid

    CounterTradeCommand:
      title: CounterTrade
      description: Reject the offer and send it back for editing by the other side.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          required: [tradeId]
          properties:
            type:
              type: string
              enum: [CounterTrade]
            tradeId:
              type: string
              format: uuid

    DeclineTradeCommand:
      title: DeclineTrade
      description: Decline the submitted offer and end the trade.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          required: [tradeId]
          properties:
            type:
              type: string
              enum: [DeclineTrade]
            tradeId:
              type: string
              format: uuid

    CancelTradeCommand:
      title: CancelTrade
      description: Cancel an open trade before an offer has been submitted.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          required: [tradeId]
          properties:
            type:
              type: string
              enum: [CancelTrade]
            tradeId:
              type: string
              format: uuid

    EditTradeOfferCommand:
      title: EditTradeOffer
      description: |
        Apply a partial update to the active trade offer.
        Only the fields present in `patch` are changed; omitted fields are left as-is.
        Common patch fields: `offeredCash` (int), `addPropertyId` (string),
        `removePropertyId` (string).
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          required: [tradeId, patch]
          properties:
            type:
              type: string
              enum: [EditTradeOffer]
            tradeId:
              type: string
              format: uuid
            patch:
              type: object
              example:
                offeredCash: 200
                addPropertyId: B1

    # ── Building / mortgage ────────────────────────────────────────────────

    BuyBuildingRoundCommand:
      title: BuyBuildingRound
      description: |
        Buy one building on every property in the colour group (one round).
        `propertyId` can be any property in the target group.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          required: [propertyId]
          properties:
            type:
              type: string
              enum: [BuyBuildingRound]
            propertyId:
              type: string
      example:
        type: BuyBuildingRound
        sessionId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        actorPlayerId: player-1
        propertyId: O1

    ToggleMortgageCommand:
      title: ToggleMortgage
      description: Mortgage an unmortgaged property, or lift the mortgage on a mortgaged one.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          required: [propertyId]
          properties:
            type:
              type: string
              enum: [ToggleMortgage]
            propertyId:
              type: string
      example:
        type: ToggleMortgage
        sessionId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        actorPlayerId: player-1
        propertyId: B1

    # ── Misc ───────────────────────────────────────────────────────────────

    RefreshSessionViewCommand:
      title: RefreshSessionView
      description: Request a fresh snapshot push over SSE without changing game state.
      allOf:
        - $ref: '#/components/schemas/BaseCommand'
        - type: object
          properties:
            type:
              type: string
              enum: [RefreshSessionView]

    # ── Jail ──────────────────────────────────────────────────────────────────

    UseGetOutOfJailCardCommand:
      title: UseGetOutOfJailCard
      description: |
        Use a "Get Out of Jail Free" card to leave jail without rolling doubles
        or paying the fine. Only valid during `WAITING_FOR_ROLL` when the player
        is in jail and holds at least one such card.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          properties:
            type:
              type: string
              enum: [UseGetOutOfJailCard]
      example:
        type: UseGetOutOfJailCard
        sessionId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        actorPlayerId: player-1

    PayJailFineCommand:
      title: PayJailFine
      description: |
        Pay the €50 jail fine to leave jail immediately before rolling.
        Only valid during `WAITING_FOR_ROLL` when the player is in jail and
        has at least €50.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          properties:
            type:
              type: string
              enum: [PayJailFine]
      example:
        type: PayJailFine
        sessionId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        actorPlayerId: player-1

    SellBuildingRoundCommand:
      title: SellBuildingRound
      description: |
        Sell one building from every property in the colour group (one round),
        returning half the house price per building. Follows the even-building rule.
        Valid during `WAITING_FOR_ROLL` and `WAITING_FOR_END_TURN`.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          required: [propertyId]
          properties:
            type:
              type: string
              enum: [SellBuildingRound]
            propertyId:
              type: string
      example:
        type: SellBuildingRound
        sessionId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        actorPlayerId: player-1
        propertyId: O1

    AbortGameCommand:
      title: AbortGame
      description: |
        Immediately ends the game for all players, setting the session status to `GAME_OVER`.
        Can be called by any player at any time during `IN_PROGRESS`.
        This action is irreversible.
      allOf:
        - $ref: '#/components/schemas/BaseActorCommand'
        - type: object
          properties:
            type:
              type: string
              enum: [AbortGame]
      example:
        type: AbortGame
        sessionId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        actorPlayerId: player-1
